<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Spending Tracker</title>
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Spending%20Tracker%22,%22short_name%22:%22Spends%22,%22start_url%22:%22./%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f172a%22,%22theme_color%22:%22%234f46e5%22}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { background: linear-gradient(135deg, #0f172a 0%, #1a1a2e 100%); color: #fff; overflow: hidden; }
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
    .header { display: flex; gap: 4px; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); flex-shrink: 0; }
    .tab-btn { flex: 1; padding: 10px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.5); font-weight: 600; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .tab-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .content { flex: 1; overflow-y: auto; padding: 1.5rem; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card { background: rgba(79,70,229,0.12); border: 1px solid rgba(79,70,229,0.35); padding: 1.25rem; border-radius: 12px; margin-bottom: 1.25rem; }
    .label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; display: block; }
    input[type=number], input[type=text], select, textarea { width: 100%; padding: 12px; border: 1px solid rgba(79,70,229,0.5); border-radius: 8px; background: rgba(15,23,42,0.85); font-size: 15px; color: #fff; font-family: inherit; }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    textarea { resize: none; height: 60px; font-size: 14px; }
    .btn { padding: 13px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; width: 100%; }
    .btn-primary { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; }
    .btn-green { background: #22c55e; color: #fff; }
    .btn-small { padding: 8px 14px; width: auto; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
    .toggle-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .toggle-btn { padding: 13px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; border: 2px solid transparent; }
    .stat-card { padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
    .bar-track { background: rgba(0,0,0,0.3); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .item { animation: slideIn 0.25s ease-out; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="tab-btn active" onclick="switchTab('log',this)">Log</button>
    <button class="tab-btn" onclick="switchTab('today',this)">Today</button>
    <button class="tab-btn" onclick="switchTab('priorities',this)">Priorities</button>
    <button class="tab-btn" onclick="switchTab('quests',this)">Quests</button>
    <button class="tab-btn" onclick="switchTab('backup',this)">⚙️</button>
  </div>

  <div class="content">

    <!-- LOG -->
    <div id="log" class="tab-content active">
      <div class="card">
        <label class="label">Amount (£)</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01" style="margin-bottom:1rem;" />

        <label class="label">Category</label>
        <select id="category" onchange="handleCategoryChange(this)" style="margin-bottom:1rem;">
          <option value="">Select</option>
          <option value="Food">🍔 Food</option>
          <option value="Escorts">🌙 Escorts</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Other">📦 Other</option>
          <option value="__new__">+ New category</option>
        </select>
        <div id="new-cat-wrap" style="display:none; margin-bottom:1rem;">
          <div style="display:flex; gap:8px;">
            <input type="text" id="new-cat-input" placeholder="Category name..." />
            <button class="btn-small" onclick="saveNewCategory()" style="background:#4f46e5; color:#fff;">Add</button>
          </div>
        </div>

        <label class="label">Was this impulsive?</label>
        <div class="toggle-wrap" style="margin-bottom:1rem;">
          <button class="toggle-btn" id="toggle-yes" onclick="setImpulsive(true)" style="background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.4); color:rgba(239,68,68,0.9);">🔥 Yes</button>
          <button class="toggle-btn" id="toggle-no" onclick="setImpulsive(false)" style="background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.4); color:rgba(34,197,94,0.9);">✓ No</button>
        </div>

        <label class="label">Note (optional)</label>
        <textarea id="note" placeholder="Add context if needed..." style="margin-bottom:1rem;"></textarea>

        <button class="btn btn-primary" onclick="logSpend()">🎯 LOG SPEND</button>
      </div>

      <div id="recent-list"></div>
    </div>

    <!-- TODAY -->
    <div id="today" class="tab-content">
      <div class="card">
        <label class="label">Daily Profit (£) — set once</label>
        <div style="display:flex; gap:8px;">
          <input type="number" id="daily-profit" placeholder="60" step="0.01" />
          <button class="btn-small" onclick="saveDailyProfit()" style="background:#4f46e5; color:#fff;">Save</button>
        </div>
      </div>

      <div id="day-rating-card" class="card" style="border-width:2px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
          <div>
            <div class="label">Day Rating</div>
            <div id="rating-text" style="font-size:26px; font-weight:700;">—</div>
          </div>
          <div style="text-align:right;">
            <div class="label">Net</div>
            <div id="net-amount" style="font-size:22px; font-weight:700;">£0</div>
          </div>
        </div>
        <div style="display:flex; gap:16px; font-size:13px;">
          <div>Profit: <span id="profit-display" style="color:#22c55e; font-weight:600;">£0</span></div>
          <div>Spent: <span id="spent-display" style="color:#ef4444; font-weight:600;">£0</span></div>
        </div>
      </div>

      <div class="stat-card" style="background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3);">
        <div class="label" style="color:rgba(239,68,68,0.8);">Impulsive Spend</div>
        <div id="impulsive-total" style="font-size:24px; font-weight:700; color:#ef4444;">£0</div>
      </div>

      <div class="stat-card" style="background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3);">
        <div class="label" style="color:rgba(34,197,94,0.8);">Normal Spend</div>
        <div id="normal-total" style="font-size:24px; font-weight:700; color:#22c55e;">£0</div>
      </div>

      <div id="today-breakdown" class="card" style="display:none;">
        <div class="label">Today's Spends</div>
        <div id="today-list"></div>
      </div>
    </div>

    <!-- PRIORITIES -->
    <div id="priorities" class="tab-content">
      <div id="priority-rating-card" class="card" style="border-width:2px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
          <div>
            <div class="label">This Week</div>
            <div id="priority-rating" style="font-size:26px; font-weight:700; color:#4f46e5;">—</div>
          </div>
          <div id="priority-percent" style="font-size:30px; font-weight:700; color:#4f46e5; align-self:center;">0%</div>
        </div>
        <div class="bar-track">
          <div id="priority-bar" class="bar-fill" style="background:#4f46e5; width:0%;"></div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex; gap:8px; margin-bottom:1rem;">
          <input type="text" id="priority-input" placeholder="Add responsibility..." />
          <button class="btn-small" onclick="addPriority()" style="background:#4f46e5; color:#fff;">Add</button>
        </div>
        <div id="priorities-list"></div>
      </div>
    </div>

    <!-- QUESTS -->
    <div id="quests" class="tab-content">
      <div id="quests-list"></div>
    </div>

    <!-- BACKUP -->
    <div id="backup" class="tab-content">
      <div class="card">
        <div style="font-size:16px; font-weight:700; margin-bottom:12px;">📦 Backup</div>
        <button class="btn btn-green" onclick="exportData()" style="margin-bottom:12px;">📥 Export Data</button>
        <textarea id="import-textarea" placeholder="Paste backup JSON here..." style="margin-bottom:12px; font-family:monospace;"></textarea>
        <button class="btn btn-primary" onclick="importData()">📤 Import Data</button>
        <div id="backup-status" style="display:none; margin-top:12px; padding:10px; border-radius:8px; font-size:13px;"></div>
      </div>
    </div>

  </div>
</div>

<script>
const state = {
  spends: JSON.parse(localStorage.getItem('spends') || '[]'),
  dailyProfit: JSON.parse(localStorage.getItem('dailyProfit') || '{}'),
  weeklyPriorities: JSON.parse(localStorage.getItem('weeklyPriorities') || '{}'),
  questBalances: JSON.parse(localStorage.getItem('questBalances') || '{}'),
  questHistory: JSON.parse(localStorage.getItem('questHistory') || '[]'),
  customCategories: JSON.parse(localStorage.getItem('customCategories') || '[]'),
  selectedImpulsive: null,
  goals: JSON.parse(localStorage.getItem('goals') || JSON.stringify([
    { name: 'Cocktail making class', target: 50, icon: '🍹' },
    { name: 'Bouldering weekend', target: 200, icon: '🧗' },
    { name: 'Salsa class series', target: 120, icon: '💃' },
    { name: 'Music production course', target: 150, icon: '🎵' },
    { name: 'Skateboard/creative gear', target: 300, icon: '🛹' },
    { name: 'Travel fund', target: 500, icon: '✈️' },
    { name: 'BJJ class package', target: 100, icon: '🥋' }
  ]))
};

// TABS
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'today') renderToday();
  else if (tab === 'priorities') renderPriorities();
  else if (tab === 'quests') renderQuests();
  else if (tab === 'log') renderRecent();
}

// IMPULSIVE TOGGLE
function setImpulsive(val) {
  state.selectedImpulsive = val;
  const yes = document.getElementById('toggle-yes');
  const no = document.getElementById('toggle-no');
  if (val === true) {
    yes.style.background = 'rgba(239,68,68,0.35)';
    yes.style.borderColor = '#ef4444';
    no.style.background = 'rgba(34,197,94,0.1)';
    no.style.borderColor = 'rgba(34,197,94,0.4)';
  } else {
    no.style.background = 'rgba(34,197,94,0.35)';
    no.style.borderColor = '#22c55e';
    yes.style.background = 'rgba(239,68,68,0.1)';
    yes.style.borderColor = 'rgba(239,68,68,0.4)';
  }
}

// CATEGORY
function handleCategoryChange(select) {
  document.getElementById('new-cat-wrap').style.display = select.value === '__new__' ? 'block' : 'none';
  if (select.value === '__new__') select.value = '';
}

function saveNewCategory() {
  const input = document.getElementById('new-cat-input');
  const name = input.value.trim();
  if (!name) return;
  if (!state.customCategories.includes(name)) {
    state.customCategories.push(name);
    localStorage.setItem('customCategories', JSON.stringify(state.customCategories));
  }
  const select = document.getElementById('category');
  if (!Array.from(select.options).find(o => o.value === name)) {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = '🏷️ ' + name;
    select.insertBefore(opt, select.querySelector('[value="__new__"]'));
  }
  select.value = name;
  input.value = '';
  document.getElementById('new-cat-wrap').style.display = 'none';
}

function loadCustomCategories() {
  const select = document.getElementById('category');
  const before = select.querySelector('[value="__new__"]');
  state.customCategories.forEach(cat => {
    if (!Array.from(select.options).find(o => o.value === cat)) {
      const opt = document.createElement('option');
      opt.value = cat; opt.textContent = '🏷️ ' + cat;
      select.insertBefore(opt, before);
    }
  });
}

// LOG SPEND
function logSpend() {
  const amount = parseFloat(document.getElementById('amount').value);
  const category = document.getElementById('category').value;
  if (!amount || !category || state.selectedImpulsive === null) {
    alert('Fill in amount, category & impulsive flag!');
    return;
  }
  const now = new Date();
  state.spends.push({
    date: now.toISOString().split('T')[0],
    time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
    amount, category,
    impulsive: state.selectedImpulsive,
    note: document.getElementById('note').value
  });
  localStorage.setItem('spends', JSON.stringify(state.spends));
  document.getElementById('amount').value = '';
  document.getElementById('category').value = '';
  document.getElementById('note').value = '';
  state.selectedImpulsive = null;
  document.getElementById('toggle-yes').style.background = 'rgba(239,68,68,0.1)';
  document.getElementById('toggle-yes').style.borderColor = 'rgba(239,68,68,0.4)';
  document.getElementById('toggle-no').style.background = 'rgba(34,197,94,0.1)';
  document.getElementById('toggle-no').style.borderColor = 'rgba(34,197,94,0.4)';
  switchTab('today', document.querySelectorAll('.tab-btn')[1]);
}

function renderRecent() {
  const today = new Date().toISOString().split('T')[0];
  const items = state.spends.filter(s => s.date === today).reverse();
  const icons = { Food:'🍔', Escorts:'🌙', Entertainment:'🎮', Other:'📦' };
  document.getElementById('recent-list').innerHTML = items.map(s => `
    <div class="item" style="background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); padding:1rem; border-radius:8px; margin-bottom:8px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
        <span style="font-size:15px; font-weight:600;">${icons[s.category] || '🏷️'} ${s.category}</span>
        <span style="font-size:16px; font-weight:700; color:#4f46e5;">£${s.amount.toFixed(2)}</span>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <span style="font-size:11px; padding:3px 8px; border-radius:4px; font-weight:600; background:${s.impulsive ? 'rgba(239,68,68,0.2)' : 'rgba(34,197,94,0.2)'}; color:${s.impulsive ? '#ef4444' : '#22c55e'};">${s.impulsive ? '🔥 Impulsive' : '✓ Normal'}</span>
        <span style="font-size:11px; color:rgba(255,255,255,0.4);">${s.time}</span>
      </div>
      ${s.note ? `<div style="font-size:12px; color:rgba(255,255,255,0.5); margin-top:6px;">${s.note}</div>` : ''}
    </div>
  `).join('') || '<div style="text-align:center; color:rgba(255,255,255,0.4); padding:2rem; font-size:14px;">No spends today</div>';
}

// TODAY
function saveDailyProfit() {
  const profit = parseFloat(document.getElementById('daily-profit').value);
  if (isNaN(profit)) { alert('Enter a profit amount'); return; }
  const today = new Date().toISOString().split('T')[0];
  state.dailyProfit[today] = profit;
  localStorage.setItem('dailyProfit', JSON.stringify(state.dailyProfit));
  renderToday();
}

function renderToday() {
  const today = new Date().toISOString().split('T')[0];
  const todaySpends = state.spends.filter(s => s.date === today);
  const profit = state.dailyProfit[today] || 0;
  const totalSpent = todaySpends.reduce((sum, s) => sum + s.amount, 0);
  const impulsive = todaySpends.filter(s => s.impulsive).reduce((sum, s) => sum + s.amount, 0);
  const normal = todaySpends.filter(s => !s.impulsive).reduce((sum, s) => sum + s.amount, 0);
  const net = profit - totalSpent;

  document.getElementById('daily-profit').value = profit || '';

  let rating, color, bg, border;
  if (profit >= 60 && totalSpent === 0) { rating = 'Perfect 🌟'; color = '#22c55e'; bg = 'rgba(34,197,94,0.15)'; border = 'rgba(34,197,94,0.5)'; }
  else if (profit >= 60 && totalSpent <= 20) { rating = 'Good'; color = '#fb923c'; bg = 'rgba(251,146,60,0.15)'; border = 'rgba(251,146,60,0.5)'; }
  else { rating = 'Bad'; color = '#ef4444'; bg = 'rgba(239,68,68,0.15)'; border = 'rgba(239,68,68,0.5)'; }

  const card = document.getElementById('day-rating-card');
  card.style.background = bg;
  card.style.borderColor = border;
  document.getElementById('rating-text').textContent = rating;
  document.getElementById('rating-text').style.color = color;
  document.getElementById('net-amount').textContent = '£' + net.toFixed(2);
  document.getElementById('net-amount').style.color = net >= 40 ? '#22c55e' : net >= 0 ? '#fb923c' : '#ef4444';
  document.getElementById('profit-display').textContent = '£' + profit.toFixed(2);
  document.getElementById('spent-display').textContent = '£' + totalSpent.toFixed(2);
  document.getElementById('impulsive-total').textContent = '£' + impulsive.toFixed(2);
  document.getElementById('normal-total').textContent = '£' + normal.toFixed(2);
}

// PRIORITIES
function getWeekKey() {
  const now = new Date();
  const d = new Date(now);
  d.setDate(d.getDate() - d.getDay() + 1);
  return d.toISOString().split('T')[0];
}

function getPriorities() { return state.weeklyPriorities[getWeekKey()] || []; }

function savePriorities(p) {
  state.weeklyPriorities[getWeekKey()] = p;
  localStorage.setItem('weeklyPriorities', JSON.stringify(state.weeklyPriorities));
}

function addPriority() {
  const input = document.getElementById('priority-input');
  if (!input.value.trim()) return;
  const p = getPriorities();
  p.push({ name: input.value.trim(), completed: false });
  savePriorities(p);
  input.value = '';
  renderPriorities();
}

function togglePriority(idx) {
  const p = getPriorities();
  p[idx].completed = !p[idx].completed;
  savePriorities(p);
  renderPriorities();
}

function deletePriority(idx) {
  const p = getPriorities();
  p.splice(idx, 1);
  savePriorities(p);
  renderPriorities();
}

function renderPriorities() {
  const p = getPriorities();
  const completed = p.filter(x => x.completed).length;
  const total = p.length;
  const pct = total === 0 ? 0 : Math.round((completed / total) * 100);

  let rating, color;
  if (total === 0) { rating = 'Nothing set'; color = '#6b7280'; }
  else if (pct === 100) { rating = 'Perfect 🌟'; color = '#22c55e'; }
  else if (pct >= 70) { rating = 'Excellent'; color = '#10b981'; }
  else if (pct >= 50) { rating = 'Responsible'; color = '#fb923c'; }
  else { rating = 'Irresponsible'; color = '#ef4444'; }

  document.getElementById('priority-rating').textContent = rating;
  document.getElementById('priority-rating').style.color = color;
  document.getElementById('priority-percent').textContent = pct + '%';
  document.getElementById('priority-percent').style.color = color;
  document.getElementById('priority-bar').style.width = pct + '%';
  document.getElementById('priority-bar').style.background = color;
  document.getElementById('priority-rating-card').style.borderColor = color;

  document.getElementById('priorities-list').innerHTML = p.map((x, i) => `
    <div class="item" style="display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); padding:0.9rem; border-radius:8px; margin-bottom:8px;">
      <input type="checkbox" ${x.completed ? 'checked' : ''} onchange="togglePriority(${i})" style="width:18px; height:18px; cursor:pointer; accent-color:#4f46e5; flex-shrink:0;" />
      <span style="flex:1; font-size:14px; ${x.completed ? 'text-decoration:line-through; color:rgba(255,255,255,0.4);' : ''}">${x.name}</span>
      <button onclick="deletePriority(${i})" style="background:rgba(239,68,68,0.15); border:none; border-radius:4px; color:#ef4444; cursor:pointer; padding:4px 8px; font-size:11px; font-weight:600;">✕</button>
    </div>
  `).join('') || '<div style="text-align:center; color:rgba(255,255,255,0.4); font-size:13px;">No responsibilities added</div>';
}

// QUESTS
function renderQuests() {
  const totalAllocated = Object.values(state.questBalances).reduce((sum, v) => sum + v, 0);
  let html = `
    <div class="stat-card" style="background:rgba(34,197,94,0.12); border:1px solid rgba(34,197,94,0.3); margin-bottom:1.25rem;">
      <div class="label" style="color:rgba(34,197,94,0.8);">Total Saved</div>
      <div style="font-size:28px; font-weight:700; color:#22c55e;">£${totalAllocated.toFixed(2)}</div>
    </div>
  `;
  html += state.goals.map((goal, idx) => {
    const saved = state.questBalances[goal.name] || 0;
    const pct = Math.min(100, Math.round((saved / goal.target) * 100));
    const complete = saved >= goal.target;
    return `
      <div class="item" style="background:${complete ? 'rgba(34,197,94,0.12)' : 'rgba(79,70,229,0.12)'}; border:2px solid ${complete ? 'rgba(34,197,94,0.4)' : 'rgba(79,70,229,0.3)'}; padding:1.25rem; border-radius:12px; margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
          <div>
            <div style="font-size:22px; margin-bottom:4px;">${goal.icon}</div>
            <div style="font-weight:600; font-size:14px;">${goal.name}</div>
          </div>
          <div style="text-align:right;">
            <div onclick="editQuestBalance(${idx})" style="font-size:18px; font-weight:700; color:${complete ? '#22c55e' : '#4f46e5'}; cursor:pointer; text-decoration:underline dotted; text-underline-offset:3px;">£${saved.toFixed(2)}</div>
            <div onclick="editQuestTarget(${idx})" style="font-size:11px; color:rgba(255,255,255,0.4); cursor:pointer; text-decoration:underline dotted; text-underline-offset:2px;">of £${goal.target}</div>
          </div>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="background:${complete ? '#22c55e' : '#4f46e5'}; width:${pct}%;"></div>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.5); margin:8px 0 10px;">
          <span>${pct}%</span>
          <span>${complete ? '🎉 Unlocked!' : '£' + Math.max(0, goal.target - saved).toFixed(2) + ' to go'}</span>
        </div>
        <div style="display:flex; gap:8px;">
          <button onclick="addToQuest(${idx})" style="flex:1; padding:8px; background:rgba(34,197,94,0.2); border:1px solid rgba(34,197,94,0.4); border-radius:6px; color:#22c55e; font-weight:600; cursor:pointer; font-size:13px;">+ Add £</button>
          ${saved > 0 ? `<button onclick="withdrawFromQuest(${idx})" style="flex:1; padding:8px; background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3); border-radius:6px; color:#ef4444; font-weight:600; cursor:pointer; font-size:13px;">− Withdraw</button>` : ''}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('quests-list').innerHTML = html;
}

function editQuestTarget(idx) {
  const goal = state.goals[idx];
  const input = prompt(`Set target for "${goal.name}" (£):`, goal.target);
  if (input === null) return;
  const target = parseFloat(input);
  if (isNaN(target) || target <= 0) { alert('Invalid amount'); return; }
  state.goals[idx].target = target;
  localStorage.setItem('goals', JSON.stringify(state.goals));
  renderQuests();
}

function editQuestBalance(idx) {
  const goal = state.goals[idx];
  const current = state.questBalances[goal.name] || 0;
  const input = prompt(`Set balance for "${goal.name}" (£):`, current.toFixed(2));
  if (input === null) return;
  const amount = parseFloat(input);
  if (isNaN(amount) || amount < 0) { alert('Invalid amount'); return; }
  const diff = amount - current;
  state.questBalances[goal.name] = amount;
  state.questHistory.push({ goal: goal.name, amount: Math.abs(diff), type: diff >= 0 ? 'add' : 'withdraw', date: new Date().toISOString(), note: 'Direct edit' });
  localStorage.setItem('questBalances', JSON.stringify(state.questBalances));
  localStorage.setItem('questHistory', JSON.stringify(state.questHistory));
  renderQuests();
}

function addToQuest(idx) {
  const goal = state.goals[idx];
  const amount = parseFloat(prompt(`Add to "${goal.name}" (£):`));
  if (isNaN(amount) || amount <= 0) return;
  state.questBalances[goal.name] = (state.questBalances[goal.name] || 0) + amount;
  state.questHistory.push({ goal: goal.name, amount, type: 'add', date: new Date().toISOString() });
  localStorage.setItem('questBalances', JSON.stringify(state.questBalances));
  localStorage.setItem('questHistory', JSON.stringify(state.questHistory));
  renderQuests();
}

function withdrawFromQuest(idx) {
  const goal = state.goals[idx];
  const current = state.questBalances[goal.name] || 0;
  const amount = parseFloat(prompt(`Withdraw from "${goal.name}" (current: £${current.toFixed(2)}):`));
  if (isNaN(amount) || amount <= 0 || amount > current) { alert('Invalid amount'); return; }
  state.questBalances[goal.name] = current - amount;
  state.questHistory.push({ goal: goal.name, amount, type: 'withdraw', date: new Date().toISOString() });
  localStorage.setItem('questBalances', JSON.stringify(state.questBalances));
  localStorage.setItem('questHistory', JSON.stringify(state.questHistory));
  renderQuests();
}

// BACKUP
function exportData() {
  const backup = { spends: state.spends, dailyProfit: state.dailyProfit, weeklyPriorities: state.weeklyPriorities, questBalances: state.questBalances, questHistory: state.questHistory, customCategories: state.customCategories, exported: new Date().toLocaleString() };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `spending-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  showStatus('✅ Exported!', '#22c55e');
}

function importData() {
  const json = document.getElementById('import-textarea').value.trim();
  if (!json) { showStatus('❌ Paste JSON first', '#ef4444'); return; }
  try {
    const b = JSON.parse(json);
    state.spends = b.spends || [];
    state.dailyProfit = b.dailyProfit || {};
    state.weeklyPriorities = b.weeklyPriorities || {};
    state.questBalances = b.questBalances || {};
    state.questHistory = b.questHistory || [];
    state.customCategories = b.customCategories || [];
    ['spends','dailyProfit','weeklyPriorities','questBalances','questHistory','customCategories'].forEach(k => localStorage.setItem(k, JSON.stringify(state[k])));
    showStatus('✅ Imported! Refreshing...', '#22c55e');
    setTimeout(() => location.reload(), 1500);
  } catch(e) { showStatus('❌ Invalid JSON', '#ef4444'); }
}

function showStatus(msg, color) {
  const el = document.getElementById('backup-status');
  el.textContent = msg;
  el.style.background = color === '#22c55e' ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)';
  el.style.color = color;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

// INIT
loadCustomCategories();
renderRecent();
renderPriorities();
renderQuests();
</script>
